services:
  listscanner:
    build: .
    container_name: listscanner-webui
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
